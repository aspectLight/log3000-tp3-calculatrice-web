# Exécute les tests et crée une issue GitHub pour chaque test en échec.
# Déclenchement : push sur main ou exécution manuelle (workflow_dispatch).
name: Tests et création d'issues

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer les tests (JUnit)
        run: |
          pytest tests/ -v --junitxml=test-results.xml

      - name: Téléverser le rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Créer les issues pour les tests en échec
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/create_issues_from_test_failures.py --junit-file test-results.xml --assignee "${{ github.actor }}"
